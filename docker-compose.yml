version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_management
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    command:
      - --bind-address=0.0.0.0
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  student-app:
    build: .
    container_name: student-management
    environment:
      SPRING_APPLICATION_NAME: student-management
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/student_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SERVER_PORT: 8089
      SERVER_SERVLET_CONTEXT_PATH: /student
    ports:
      - "8083:8089"
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  mysql_data:
